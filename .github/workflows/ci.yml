name: CI

# Full training/evaluation needs the HateXplain and Davidson datasets, a GPU-optional
# but multi-hour CPU budget, and CodeCarbon hardware access, none of which are
# available on hosted runners. This workflow instead runs the checks that ARE safe
# and useful in CI: every script imports cleanly with the pinned dependencies, and
# every script is syntactically valid. This catches broken imports, typos, and
# dependency drift on every push/PR without pretending to reproduce the full paper.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sanity-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile-check all scripts
        run: |
          python -m py_compile *.py

      - name: Import-check all scripts
        run: |
          for f in *.py; do
            echo "Checking $f"
            python -c "import ast,sys; ast.parse(open('$f').read())"
          done

      - name: Validate result JSON files are well-formed
        run: |
          python - <<'EOF'
          import json, glob
          for f in glob.glob("*.json"):
              with open(f) as fh:
                  json.load(fh)
              print(f"OK: {f}")
          EOF
